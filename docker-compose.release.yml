# Print Vault — Release Docker Compose
#
# This file is for users who want to run Print Vault without building from source.
# It pulls pre-built images from GitHub Container Registry (GHCR).
#
# Quick start:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose -f docker-compose.release.yml up -d
#
# To pin to a specific version instead of latest, change the image tags:
#   image: ghcr.io/shaxs/print-vault-backend:1.1.0

services:
  backend:
    image: ghcr.io/shaxs/print-vault-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/media:/code/media
      - static_volume:/code/staticfiles
    expose:
      - "8000"
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=backend.production
      - PYTHONPATH=/code
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - APP_HOST=${APP_HOST}
      - APP_PORT=${APP_PORT}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/shaxs/print-vault-frontend:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./data/media:/usr/share/nginx/html/media:ro
    depends_on:
      - backend

  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data/
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
      - "POSTGRES_DB=postgres"
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  static_volume:
