# Print Vault — Release Docker Compose
#
# This file is for users who want to run Print Vault without building from source.
# It pulls pre-built images from GitHub Container Registry (GHCR).
#
# Quick start:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose -f docker-compose.release.yml up -d
#
# To pin to a specific version instead of latest, change the image tags:
#   image: ghcr.io/shaxs/print-vault-backend:1.1.0

# Shared by backend and qcluster — they run the same Django app against the
# same database, just with a different entrypoint. Single source of truth so
# the two service definitions can't drift out of sync.
x-django-env: &django-env
  - DJANGO_SETTINGS_MODULE=backend.production
  - PYTHONPATH=/code
  - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
  - DJANGO_DEBUG=${DJANGO_DEBUG}
  - ALLOWED_HOSTS=${ALLOWED_HOSTS}
  - POSTGRES_USER=${POSTGRES_USER:-postgres}
  - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
  - APP_HOST=${APP_HOST}
  - APP_PORT=${APP_PORT}

services:
  backend:
    image: ghcr.io/shaxs/print-vault-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/media:/code/media
      - static_volume:/code/staticfiles
      # STL/3MF library share — see .env (LIBRARY_HOST_PATH / LIBRARY_MOUNT_PATH).
      - ${LIBRARY_HOST_PATH:-./data/library}:${LIBRARY_MOUNT_PATH:-/mnt/nas/stls}:rw
    expose:
      - "8000"
    ports:
      - "8000:8000"
    environment: *django-env
    depends_on:
      db:
        condition: service_healthy

  qcluster:
    # Background worker (Django-Q): library scans, thumbnail rendering,
    # scheduled rescans. Same image as backend, different entrypoint. Without
    # this service, no background job runs at all.
    image: ghcr.io/shaxs/print-vault-backend:latest
    restart: unless-stopped
    entrypoint: ["/entrypoint-qcluster.sh"]
    # Kernel-enforced memory ceiling for the worker, swap disabled (memswap ==
    # mem). Backstop behind the app-level render caps: the host can never be
    # pushed into swap-thrash by a scan. Size to the host: ~1g on a 2 GB Pi,
    # the 2g default suits 4 GB+.
    mem_limit: ${QCLUSTER_MEM_LIMIT:-2g}
    memswap_limit: ${QCLUSTER_MEM_LIMIT:-2g}
    env_file:
      - .env
    volumes:
      - ./data/media:/code/media
      # The library scan runs in THIS container, so it needs the same share
      # mount as backend — otherwise the scan can't see the path.
      - ${LIBRARY_HOST_PATH:-./data/library}:${LIBRARY_MOUNT_PATH:-/mnt/nas/stls}:rw
    environment: *django-env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/shaxs/print-vault-frontend:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./data/media:/usr/share/nginx/html/media:ro
    depends_on:
      - backend

  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data/
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
      - "POSTGRES_DB=postgres"
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  static_volume:
