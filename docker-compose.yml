services:
  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data/media:/code/media
      - static_volume:/code/staticfiles
      # STL/3MF library share. Host path and in-container mount point are both
      # configurable via .env; the mount point must match the path entered in
      # the library settings UI. Defaults keep a local-only setup working.
      - ${LIBRARY_HOST_PATH:-./data/library}:${LIBRARY_MOUNT_PATH:-/mnt/nas/stls}:rw
    expose:
      - "8000"
    ports:
      - "8000:8000" # Expose port 8000 to the host machine
    environment:
      - DJANGO_SETTINGS_MODULE=backend.production
      - PYTHONPATH=/code
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - APP_HOST=${APP_HOST}
      - APP_PORT=${APP_PORT}
    depends_on:
      db:
        condition: service_healthy

  qcluster:
    build: .
    restart: unless-stopped
    entrypoint: ["/entrypoint-qcluster.sh"]
    env_file:
      - .env
    volumes:
      - ./data/media:/code/media
      # The library scan runs as a Django-Q task in THIS container, so it needs
      # the same share mount as backend — otherwise the scan can't see the path.
      - ${LIBRARY_HOST_PATH:-./data/library}:${LIBRARY_MOUNT_PATH:-/mnt/nas/stls}:rw
    environment:
      - DJANGO_SETTINGS_MODULE=backend.production
      - PYTHONPATH=/code
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - APP_HOST=${APP_HOST}
      - APP_PORT=${APP_PORT}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      # This exposes the application on the port defined in your .env file
      - "${APP_PORT}:80"
    volumes:
      # This gives Nginx read-only access to the same media folder
      - ./data/media:/usr/share/nginx/html/media:ro
    depends_on:
      - backend

  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data/
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
      - "POSTGRES_DB=postgres"
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  static_volume:
